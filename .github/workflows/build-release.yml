name: Build release

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install verified Inno Setup
        shell: pwsh
        run: ./scripts/install-inno.ps1

      - name: Build release installer
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: SWiT-windows-x64-${{ github.run_number }}
          path: |
            dist/SWiT-Setup-*.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error
